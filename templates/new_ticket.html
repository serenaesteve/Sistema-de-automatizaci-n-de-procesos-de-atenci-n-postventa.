{% extends "base.html" %}
{% block title %}Nuevo Ticket{% endblock %}
{% block breadcrumb %}Tickets / Nuevo{% endblock %}
{% block page_title %}Nuevo Ticket{% endblock %}

{% block content %}
<div style="max-width:640px">
<div class="card">
  <div class="card-header"><h3>Crear ticket de soporte</h3></div>
  <div class="card-body">
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nombre del cliente</label>
          <input class="form-control" name="customer_name" required placeholder="María García">
        </div>
        <div class="form-group">
          <label class="form-label">Email del cliente</label>
          <input class="form-control" type="email" name="customer_email" required placeholder="cliente@email.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Título del ticket</label>
        <input class="form-control" name="title" required placeholder="Breve descripción del problema">
      </div>
      <div class="form-group">
        <label class="form-label">Descripción detallada</label>
        <textarea class="form-control" name="description" required placeholder="Describe el problema con detalle..."></textarea>
      </div>
      <div class="form-row-3">
        <div class="form-group">
          <label class="form-label">Categoría</label>
          <select class="form-control" name="category">
            <option value="general">General</option>
            <option value="reclamacion">Reclamación</option>
            <option value="devolucion">Devolución</option>
            <option value="seguimiento">Seguimiento</option>
            <option value="facturacion">Facturación</option>
            <option value="tecnico">Técnico</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Prioridad</label>
          <select class="form-control" name="priority">
            <option value="low">Baja</option>
            <option value="medium" selected>Media</option>
            <option value="high">Alta</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Asignar a agente</label>
          <select class="form-control" name="assigned_to">
            <option value="">Sin asignar</option>
            {% for a in agents %}
            <option value="{{ a.id }}">{{ a.username }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="flex gap-8">
        <button type="submit" class="btn btn-primary">Crear ticket</button>
        <a href="{{ url_for('tickets') }}" class="btn btn-ghost">Cancelar</a>
      </div>
    </form>
  </div>
</div>
</div>
{% endblock %}
