{% extends "base.html" %}
{% block title %}Pedido {{ order.order_number }}{% endblock %}
{% block breadcrumb %}Pedidos / {{ order.order_number }}{% endblock %}
{% block page_title %}{{ order.order_number }}{% endblock %}

{% block content %}
<div style="max-width:560px">
<div class="card">
  <div class="card-header">
    <h3>Editar pedido</h3>
    <span class="badge badge-{{ order.status }}">{{ order.status }}</span>
  </div>
  <div class="card-body">
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cliente</label>
          <input class="form-control" value="{{ order.customer_name }}" disabled>
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input class="form-control" value="{{ order.customer_email }}" disabled>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Producto</label>
        <input class="form-control" value="{{ order.product }}" disabled>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Importe</label>
          <input class="form-control" value="{{ "%.2f"|format(order.amount) }} €" disabled>
        </div>
        <div class="form-group">
          <label class="form-label">Estado</label>
          <select class="form-control" name="status">
            {% for s in ['processing','shipped','delivered','cancelled'] %}
            <option value="{{ s }}" {{ 'selected' if order.status==s }}>{{ s }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Número de tracking</label>
          <input class="form-control" name="tracking_number" value="{{ order.tracking_number or '' }}" placeholder="TRK123456">
        </div>
        <div class="form-group">
          <label class="form-label">Entrega estimada</label>
          <input class="form-control" type="date" name="estimated_delivery" value="{{ order.estimated_delivery or '' }}">
        </div>
      </div>
      <div class="flex gap-8">
        <button type="submit" class="btn btn-primary">Guardar cambios</button>
        <a href="{{ url_for('orders') }}" class="btn btn-ghost">Cancelar</a>
      </div>
    </form>
  </div>
</div>
</div>
{% endblock %}
