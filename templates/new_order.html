{% extends "base.html" %}
{% block title %}Nuevo Pedido{% endblock %}
{% block breadcrumb %}Pedidos / Nuevo{% endblock %}
{% block page_title %}Nuevo Pedido{% endblock %}

{% block content %}
<div style="max-width:560px">
<div class="card">
  <div class="card-header"><h3>Registrar pedido</h3></div>
  <div class="card-body">
    <form method="POST">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Nombre del cliente</label>
          <input class="form-control" name="customer_name" required placeholder="Juan López">
        </div>
        <div class="form-group">
          <label class="form-label">Email del cliente</label>
          <input class="form-control" type="email" name="customer_email" required placeholder="cliente@email.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Producto</label>
        <input class="form-control" name="product" required placeholder="Nombre del producto">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Importe (€)</label>
          <input class="form-control" type="number" step="0.01" name="amount" required placeholder="0.00">
        </div>
        <div class="form-group">
          <label class="form-label">Estado inicial</label>
          <select class="form-control" name="status">
            <option value="processing">Procesando</option>
            <option value="shipped">Enviado</option>
            <option value="delivered">Entregado</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Tracking (opcional)</label>
          <input class="form-control" name="tracking_number" placeholder="TRK123456">
        </div>
        <div class="form-group">
          <label class="form-label">Entrega estimada</label>
          <input class="form-control" type="date" name="estimated_delivery">
        </div>
      </div>
      <div class="flex gap-8">
        <button type="submit" class="btn btn-primary">Crear pedido</button>
        <a href="{{ url_for('orders') }}" class="btn btn-ghost">Cancelar</a>
      </div>
    </form>
  </div>
</div>
</div>
{% endblock %}
